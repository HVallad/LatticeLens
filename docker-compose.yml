services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: latticelens
      POSTGRES_USER: latticelens
      POSTGRES_PASSWORD: latticelens_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U latticelens"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: uvicorn latticelens.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      LATTICELENS_DATABASE_URL: postgresql+asyncpg://latticelens:latticelens_dev@postgres:5432/latticelens
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./seed:/app/seed

  mcp-server:
    build: .
    command: python -m latticelens_mcp --transport http
    ports:
      - "8080:8080"
    environment:
      LATTICELENS_API_URL: http://api:8000/api/v1
      LATTICELENS_MCP_TRANSPORT: streamable-http
      LATTICELENS_MCP_PORT: "8080"
    depends_on:
      api:
        condition: service_started
    profiles:
      - mcp

volumes:
  pgdata:
