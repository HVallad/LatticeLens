[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "latticelens"
version = "0.1.0"
description = "Knowledge governance layer for AI agent systems"
license = "MIT"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.27.0",
    "sqlalchemy>=2.0.0",
    "asyncpg>=0.29.0",
    "alembic>=1.13.0",
    "pydantic>=2.6.0",
    "pydantic-settings>=2.1.0",
    "typer>=0.9.0",
    "rich>=13.0.0",
    "httpx>=0.27.0",
    "tiktoken>=0.6.0",
    "anthropic>=0.25.0",
    "pyyaml>=6.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-httpx>=0.30.0",
    "ruff>=0.3.0",
]
mcp = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
lattice = "latticelens.cli.main:app"
latticelens-mcp = "latticelens_mcp.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["latticelens*", "latticelens_mcp*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 120
