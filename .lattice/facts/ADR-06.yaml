code: ADR-06
layer: WHY
type: Architecture Decision Record
fact: References to non-existent fact codes produce warnings, not errors (soft 
  ref integrity). This allows facts to be created in any order, enables partial 
  lattices, and avoids circular dependency problems during initial knowledge 
  capture. Broken refs are surfaced by lattice validate.
