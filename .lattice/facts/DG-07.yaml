code: DG-07
layer: GUARDRAILS
type: Data Governance Rule
fact: 'Tags use a controlled vocabulary organized into five categories: domain (model-selection,
  inference, latency, scaling), concern (security, privacy, bias, compliance), lifecycle
  (design-time, runtime, incident-response), stakeholder (end-user, developer, auditor),
  and risk (high-severity, mitigated, accepted-risk). Free tags outside the vocabulary
  are allowed but must be lowercase and hyphenated. Tags used more than 3 times across
  the lattice should be reviewed for inclusion in the controlled vocabulary.'
