code: ADR-18
layer: WHY
type: Architecture Decision Record
fact: Project scoping uses a single optional .lattice/projects.yaml registry 
  file that defines both project names and project groups. Groups are referenced
  in fact projects fields via a "group:" prefix (e.g. group:pci-scope) to avoid 
  namespace collisions with literal project names. The registry file is optional
  — when absent, scoping is entirely disabled and all facts are visible to all
  contexts (backward compatible). This design follows the existing registry 
  pattern established by tags.yaml and types.yaml, keeping configuration 
  co-located in the lattice root.
