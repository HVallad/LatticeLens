fact: 'Phase 3 must include explicit lifecycle transition commands: lattice fact promote
  CODE (Draft → Under Review → Active) and lattice fact deprecate CODE (already
  exists). The promote command should require a --reason flag documenting why the
  fact is ready for the next state. Additionally, lattice fact add must default to
  status Draft rather than Active. Context assembly must respect lifecycle states
  per DG-06 and AUP-07: Draft facts are never assembled, Under Review facts are included
  only with confidence Provisional, and only Active/Confirmed facts are prioritized.'
