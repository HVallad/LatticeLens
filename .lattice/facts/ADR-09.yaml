fact: LATTICE_VERSION follows a semver convention where the minor version tracks
  implementation phases (0.1.0 = Phase 1, 0.2.0 = Phase 2) and the patch version
  tracks fixes within a phase. The lattice upgrade migration runner compares 
  version tuples to determine which migrations to apply, establishing backward 
  compatibility boundaries at each minor version bump.
