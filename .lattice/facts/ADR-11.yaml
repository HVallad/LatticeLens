code: ADR-11
layer: WHY
type: Architecture Decision Record
fact: find_lattice_root() walks upward from the current working directory 
  through parent directories to locate a .lattice/ directory, mirroring how git 
  discovers .git/. This enables running lattice commands from any subdirectory 
  of a project. If no .lattice/ is found, the CLI prints an error directing the 
  user to run lattice init.
