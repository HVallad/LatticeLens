fact: Contradiction candidates are defined as pairs of Active facts sharing at 
  least N tags (default 2) but differing in layer or owner. This heuristic flags
  potential conflicts for human review, not confirmed contradictions. The O(n^2)
  pairwise comparison is acceptable for expected lattice sizes. Only Active 
  facts are considered — Deprecated and Draft facts are excluded.
