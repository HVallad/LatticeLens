fact: lattice graph impact CODE performs breadth-first reverse-reference 
  traversal from the given fact code. It collects directly affected facts (depth
  1) and transitively affected facts (depth 2+) up to --depth N (default 3). A 
  visited set prevents infinite loops from circular references. Results include 
  affected role templates matched against each affected fact's layer and type.
