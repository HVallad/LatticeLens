code: RISK-06
layer: GUARDRAILS
type: Risk Register Entry
fact: Storage tier promotion uses advisory thresholds — warn at 1,500 facts, 
  suggest upgrade at 2,000 — but the system must never auto-migrate. The 
  developer always decides when to move between tiers. Forced migration would 
  violate the portability principle and risk data loss. The CLI prints a 
  performance advisory at the warning threshold and a concrete upgrade 
  suggestion at the promotion threshold, but takes no action without explicit 
  user command.
