fact: 'The fact owner field is free-text, not validated against a registry. Typos
  in owner values (e.g., "arch-team" vs "architecture-team") cause false positives
  in contradiction candidate detection, which flags pairs with differing owners. Mitigation:
  teams should establish naming conventions. Future phases may add owner validation
  against a .lattice/owners.yaml file.'
