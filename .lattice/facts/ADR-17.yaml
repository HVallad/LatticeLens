type: Architecture Decision Record
fact: 'The reconciliation engine uses rule-based pattern matching as its primary strategy:
  regex scanning for explicit fact code references in comments and strings, plus architectural
  pattern detection for common imports, configs, and security patterns. LLM-assisted
  analysis is available behind an optional --llm flag (with --model and --api-key
  options) but disabled by default. This decision prioritizes deterministic, reproducible
  results with zero external dependencies for the default reconciliation path, while
  allowing LLM enrichment when deeper semantic analysis is needed.'
