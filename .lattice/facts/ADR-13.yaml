layer: WHY
type: Architecture Decision Record
fact: 'LatticeLens is released under the MIT License. MIT was chosen for three reasons:
  attribution (copyright notice required), adoption friction (most trusted open-source
  license, zero legal review overhead), and simplicity (four sentences, no ambiguity).
  MIT does not include an explicit patent grant — if the contributor base grows
  to include corporate entities with significant patent portfolios, relicensing to
  Apache 2.0 should be evaluated.'
