code: RUN-04
layer: HOW
type: Runbook Procedure
fact: lattice upgrade reads the current version from .lattice/config.yaml 
  (defaults to 0.1.0 if absent) and applies any pending migrations from the 
  ordered MIGRATIONS list. Each migration has a target version, description, and
  callable. After applying all needed migrations the new version is stamped into
  config.yaml. Running upgrade on an already-current lattice is a no-op.
