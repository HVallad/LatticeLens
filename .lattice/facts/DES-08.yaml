fact: The Context Assembly Engine is the "lens" in LatticeLens. It queries the 
  Fact Index to construct each agent role's context window with exactly the 
  facts relevant to that role, respecting a token budget. Each role has a query 
  template selecting facts by layer, type, status, and tags. Dynamic expansion 
  supports tag-based pulls, reference traversal, confidence filtering, recency 
  weighting, and severity filtering. Version pinning records which fact versions
  each agent invocation used for full audit reproducibility.
