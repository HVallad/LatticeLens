fact: The import overwrite path strips created_at and version from the changes dict
  before calling store.update(). This ensures created_at remains immutable (AUP-05)
  and version is auto-incremented by the store layer (AUP-03). The store's update
  method merges remaining fields into the existing fact, bumps version by 1, and
  sets updated_at to now. Pydantic validators still run on the merged result,
  catching any constraint violations (e.g. Superseded without superseded_by per
  AUP-04).
