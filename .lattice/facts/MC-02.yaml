fact: FactIndex.build() is resilient to corrupt or unparseable YAML files. When 
  a file fails to load, the error is logged as a warning and the file is 
  skipped. The index continues building from remaining valid files. This 
  partial-index approach ensures that one bad file does not block all lattice 
  operations. The validate command separately reports per-file parse errors.
