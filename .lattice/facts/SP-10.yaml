fact: 'The lattice reconcile command scans a codebase and produces a bidirectional
  reconciliation report. Flags: --path (directory to scan, default project root),
  --include (glob patterns, default **/*.py), --exclude (glob patterns, default node_modules/.venv/__pycache__),
  --llm (enable LLM-assisted analysis via Anthropic API), --model (model selection),
  --api-key (Anthropic API key), --llm-prompt (print reconciliation prompt for agent
  integration), --json (machine-readable output), --verbose (per-fact matching details).
  Default output is a Rich table showing counts by finding category plus detailed
  listings for stale, violated, and untracked findings. The MCP server exposes a read-only
  reconcile tool returning the summary dict.'
