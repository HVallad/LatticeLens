code: DG-13
layer: GUARDRAILS
type: Data Governance Rule
fact: The project registry at .lattice/projects.yaml enforces two hard 
  validation constraints. First, group names must not collide with project names
  — a group called "billing" when "billing" is also a project name is a 
  validation error. Second, all group members must reference projects that exist
  in the projects list. The lattice validate command checks both constraints and
  also warns when a fact references a project or group not defined in the 
  registry. These checks prevent silent scoping failures where facts appear 
  unscoped due to typos or stale references.
