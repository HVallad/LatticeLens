code: AUP-03
layer: GUARDRAILS
type: Acceptable Use Policy Rule
fact: Fact version must increment by exactly 1 on each update. This enforces a 
  linear edit history and prevents accidental version jumps or rollbacks. The 
  store layer auto-increments version on update — manual version manipulation 
  is not supported.
