code: DES-05
layer: WHY
type: Design Proposal Decision
fact: 'LatticeLens solves the context crisis in multi-agent systems. When multiple
  agents collaborate, context management breaks down: granularity is too coarse, cross-cutting
  facts are buried in documents, updates force full re-slicing, deduplication across
  documents is impossible, and silent drift between documented intent and implemented
  reality grows unchecked. LatticeLens replaces document-level context with atomic,
  versioned, governed facts.'
