code: ADR-07
layer: WHY
type: Architecture Decision Record
fact: Each fact is stored as a separate YAML file (.lattice/facts/{CODE}.yaml) 
  rather than a single monolithic file. This enables per-fact git diffs, blame 
  for individual decisions, merge conflicts scoped to single facts, and parallel
  editing without lock contention.
