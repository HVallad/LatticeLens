code: AUP-06
layer: GUARDRAILS
type: Acceptable Use Policy Rule
fact: Duplicate fact codes are a hard validation error enforced at two levels. 
  First, the Fact model code field uses a regex pattern validator that rejects 
  malformed codes on parse. Second, YAMLLatticeStore.add() checks if the file 
  already exists and raises FileExistsError on duplicates. The validate command 
  also reports duplicate codes found across files. This ensures code uniqueness 
  across the lattice.
