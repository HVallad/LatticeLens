code: AUP-06
layer: GUARDRAILS
type: Acceptable Use Policy Rule
fact: Duplicate fact codes are a hard validation error enforced at two levels. 
  First, the Fact model's code_format validator rejects malformed codes on 
  parse. Second, YAMLLatticeStore.add() checks the store for existing codes and 
  raises ValueError on duplicates. FactIndex.build() also detects duplicate 
  codes during indexing. This triple guard ensures code uniqueness across the 
  lattice.
