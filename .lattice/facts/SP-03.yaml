code: SP-03
layer: HOW
type: System Prompt Rule
fact: Role template matching determines which agent roles are affected by a fact
  change. A role is affected if any impacted fact's layer appears in the role's 
  query.layers AND (no types filter is set OR the fact's type appears in 
  query.types). Extra rules in query.extra provide additional layer+type matches
  beyond the primary query.
