code: RISK-05
layer: GUARDRAILS
type: Risk Register Entry
fact: 'The valid code prefix vocabulary (ADR, PRD, DES, SP, API, RUN, MON, DG, AUP,
  RISK, MC, HOW) is hardcoded in config.py as LAYER_PREFIXES, a dict mapping each
  layer (WHY, GUARDRAILS, HOW) to its allowed prefixes. Adding new prefixes requires
  a code change and package release. Mitigation: Phase 3+ may move prefix configuration
  to .lattice/config.yaml for per-project customization.'
