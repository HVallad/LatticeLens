code: RISK-03
layer: GUARDRAILS
type: Risk Register Entry
fact: 'The fact type field is free-text, not an enum. Inconsistent type strings (e.g.,
  "Architecture Decision Record" vs "ADR" vs "Arch Decision") will cause role template
  matching to miss facts silently. Mitigation: future phases should add type normalization
  or a controlled vocabulary. Currently, the seed data and documentation establish
  conventions but do not enforce them.'
