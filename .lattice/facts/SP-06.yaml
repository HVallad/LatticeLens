layer: HOW
type: System Prompt Rule
fact: lattice diff [--staged] scopes git diff to .lattice/facts/ and parses the 
  unified diff output to extract changed fact codes and modified fields. lattice
  log [CODE] [--limit N] scopes git log to .lattice/facts/ and optionally 
  follows a single fact file with --follow. Both commands check for git 
  availability first and print a graceful error if not in a git repo.
