code: ADR-12
layer: WHY
type: Architecture Decision Record
fact: Runtime settings use pydantic-settings with env_prefix LATTICE_, allowing 
  environment variables like LATTICE_ANTHROPIC_API_KEY to configure the 
  application without modifying config.yaml. The Settings class declares 
  lattice_root (auto-discovered), anthropic_api_key (empty default), and 
  extraction_model (defaults to claude-sonnet-4-20250514) for Phase 4 LLM 
  extraction.
