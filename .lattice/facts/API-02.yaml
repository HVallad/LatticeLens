code: API-02
layer: HOW
type: API Specification
fact: The graph service exposes three public functions — impact_analysis(), 
  find_orphans(), and find_contradiction_candidates() — plus a 
  load_role_templates() helper. All accept a FactIndex as their primary 
  argument, keeping the service stateless. ImpactResult is a dataclass returned 
  by impact_analysis() containing source_code, directly_affected, 
  transitively_affected, all_affected sets, affected_roles list, and 
  depth_reached integer.
