code: DG-03
layer: GUARDRAILS
type: Data Governance Rule
fact: Every fact requires a minimum of 2 tags and a minimum fact text length of 
  10 characters. These minimums ensure facts are categorizable and contain 
  meaningful content. Enforced by Pydantic field constraints (min_length on tags
  list and fact string).
