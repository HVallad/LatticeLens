code: PRD-02
layer: WHY
type: Product Requirement
fact: LatticeLens must remain AI tool and model agnostic. It is not tied to any 
  specific AI model (GPT, Claude, Gemini, open-source), agent framework 
  (LangChain, CrewAI, CoderClaw), or orchestration tool. It is a substrate — 
  the knowledge governance layer that any agent framework can build on. The 
  integration model exposes a clean API surface that external orchestrators 
  consume. This agnosticism is a core product requirement, not a convenience.
