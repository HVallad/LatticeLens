code: DG-12
layer: GUARDRAILS
type: Data Governance Rule
fact: The Fact model includes a projects field (list of strings, default empty).
  An empty list means the fact is global and applies to all projects. A 
  non-empty list scopes the fact to those projects — entries are either 
  literal project names (lowercased, alphanumeric with hyphens/underscores) or 
  group references prefixed with "group:" that expand to member lists via 
  projects.yaml. Project filtering includes both scoped matches and global facts
  (empty projects list). The active project is detected from the default_project
  field in config.yaml or via --project CLI flags. All stores (YAML and SQLite),
  context assembly, and governance briefing respect this filter.
