type: Data Governance Rule
fact: 'Tags are always normalized on write: lowercased, sorted alphabetically, and
  deduplicated. Tag values must be alphanumeric with hyphens or underscores only —
  special characters are rejected. This is enforced by a Pydantic field_validator
  and ensures consistent querying.'
