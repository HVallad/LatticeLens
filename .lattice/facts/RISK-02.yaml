fact: In-memory index rebuild on every store operation could become slow with 
  thousands of facts. Currently acceptable for expected scale (hundreds of facts
  per project). Phase 3 context assembly adds token counting overhead. If scale 
  becomes an issue, consider persistent index or lazy invalidation strategy.
