fact: The import command with strategy=fail aborts on the first code collision 
  by raising FileExistsError. However, facts processed before the collision have
  already been written to disk and are not rolled back. This means a partial 
  import can occur. Mitigation — users can re-run with strategy=skip to safely
  complete the remaining facts, or use lattice export to back up before 
  importing. Residual risk is LOW since the skip strategy is the default.
