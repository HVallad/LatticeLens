fact: lattice reindex rebuilds the .lattice/index.json file from all YAML files 
  in .lattice/facts/. The index stores forward refs (code -> codes it 
  references) and reverse refs (code -> codes that reference it). Reindexing is 
  idempotent and recovers from stale or corrupt index files. It should be run 
  after bulk edits or manual YAML changes outside the CLI.
