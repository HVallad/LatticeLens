code: DES-06
layer: WHY
type: Design Proposal Decision
fact: 'LatticeLens uses a four-tier progressive storage architecture. Tier 1: YAML
  flat files for getting started (git-native, zero infrastructure). Tier 2: SQLite
  for scaling locally to 100K facts. Tier 3: MCP server for shared and centralized
  access. Tier 4: Enterprise relational database (via SQLAlchemy) for multi-user,
  multi-project deployments. All tiers share the same CLI, LatticeStore interface,
  and fact schema. The developer decides when to move between tiers — the system
  advises but never forces.'
