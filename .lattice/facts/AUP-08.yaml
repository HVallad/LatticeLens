code: AUP-08
layer: GUARDRAILS
type: Acceptable Use Policy Rule
fact: All new facts must be created with status Draft and progress through the 
  full lifecycle (Draft → Under Review → Active) before entering agent 
  context. The 59 founding facts created during Phase 1–2 development are 
  grandfathered as Active. Going forward, the lattice fact add command should 
  default to status Draft. Promotion to Active requires explicit review via a 
  lifecycle transition command. This enforces the governance model documented in
  DG-06 and ensures the dogfood lattice demonstrates proper workflow.
