fact: Impact analysis traverses the reverse reference graph using BFS with a 
  visited set to prevent infinite loops on circular refs. At each depth level, 
  facts referencing the current code are collected. Depth 1 results are 
  "directly affected", depth 2+ are "transitively affected". The max_depth 
  parameter (default 3) bounds traversal.
